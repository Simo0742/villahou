name: Opdater Airbnb kalender

on:
  schedule:
    - cron: '0 * * * *'   # Kører hver time
  workflow_dispatch:        # Kan også køres manuelt

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Hent Airbnb iCal og gem som JSON
        run: |
          curl -s "https://www.airbnb.dk/calendar/ical/1440420483011438215.ics?t=50358892574146fbb10083c54419f796" -o calendar.ics

          python3 << 'PYEOF'
          import re, json
          from datetime import datetime

          with open('calendar.ics', 'r', encoding='utf-8', errors='ignore') as f:
              text = f.read()

          ranges = []
          events = text.split('BEGIN:VEVENT')
          for ev in events[1:]:
              s = re.search(r'DTSTART[^:\n]*:([^\r\n]+)', ev)
              e = re.search(r'DTEND[^:\n]*:([^\r\n]+)', ev)
              if s and e:
                  try:
                      ds = s.group(1).strip().replace('Z','')[:8]
                      de = e.group(1).strip().replace('Z','')[:8]
                      ranges.append({'from': ds, 'to': de})
                  except:
                      pass

          out = {
              'updated': datetime.utcnow().strftime('%Y-%m-%dT%H:%M:%SZ'),
              'booked': ranges
          }
          with open('calendar.json', 'w') as f:
              json.dump(out, f)
          print(f"Gemt {len(ranges)} bookinger")
          PYEOF

      - name: Commit og push calendar.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add calendar.json
          git diff --staged --quiet || git commit -m "Opdater kalender $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
